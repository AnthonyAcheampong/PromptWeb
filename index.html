<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | PromptPlay</title>
 
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        #unity-container {
            width: 100vw;
            height: 100vh;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
        }
    </style>  

  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">PromptPlay</div>
      </div>
    </div>
    <script>
  var canvas = document.querySelector("#unity-canvas");

  function unityShowBanner(msg, type) {
    var warningBanner = document.querySelector("#unity-warning");
    function updateBannerVisibility() {
      warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
    }
    var div = document.createElement('div');
    div.innerHTML = msg;
    warningBanner.appendChild(div);
    if (type == 'error') div.style = 'background: red; padding: 10px;';
    else {
      if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
      setTimeout(function() {
        warningBanner.removeChild(div);
        updateBannerVisibility();
      }, 5000);
    }
    updateBannerVisibility();
  }

  var buildUrl = "Build";
  var loaderUrl = buildUrl + "/Web_Les_1.loader.js";
  var config = {
    arguments: [],
    dataUrl: buildUrl + "/Web_Les_1.data",
    frameworkUrl: buildUrl + "/Web_Les_1.framework.js",
    codeUrl: buildUrl + "/Web_Les_1.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "TonyWalkerStudios",
    productName: "PromptPlay",
    productVersion: "1.0",
    showBanner: unityShowBanner,
  };

  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    var meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
    document.getElementsByTagName('head')[0].appendChild(meta);
    document.querySelector("#unity-container").className = "unity-mobile";
    canvas.className = "unity-mobile";
  } else {
      canvas.style.width = "100%";
      canvas.style.height = "100%";
  }

  document.querySelector("#unity-loading-bar").style.display = "block";

  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
    }).then((unityInstance) => {
      document.querySelector("#unity-loading-bar").style.display = "none";
      document.querySelector("#unity-fullscreen-button").onclick = () => {
        unityInstance.SetFullscreen(1);
      };
    }).catch((message) => {
      alert(message);
    });
  };

  document.body.appendChild(script);
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword
        } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import {
            getDatabase,
            ref,
            set,
            get
        } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjiCrcC77R_vVMHT0jBR34Fm1Nw8WpBGU",
            authDomain: "promptplayapp.firebaseapp.com",
            databaseURL: "https://promptplayapp-default-rtdb.firebaseio.com",
            projectId: "promptplayapp",
            storageBucket: "promptplayapp.firebasestorage.app",
            messagingSenderId: "614228935219",
            appId: "1:614228935219:web:997b92dc6fcc30a2621946",
            measurementId: "G-2KYHE0D91S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.PromptPlayFirebase = {
            signUp: async function (email, password) {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                return userCredential.user.uid;
            },

            signIn: async function (email, password) {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                return userCredential.user.uid;
            },

            saveProgress: async function (userId, jsonString) {
                const data = JSON.parse(jsonString);
                await set(ref(db, "users/" + userId + "/progress"), data);
                return true;
            },

            loadProgress: async function (userId) {
                const snapshot = await get(ref(db, "users/" + userId + "/progress"));
                if (snapshot.exists()) {
                    return JSON.stringify(snapshot.val());
                }
                return "";
            }
        };

        console.log("PromptPlay Firebase Web SDK ready");
    </script>
  </body>
</html>
